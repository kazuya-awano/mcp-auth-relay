identity:
  name: "mcp_tool_call"
  author: "kazuya-awano"
  label:
    en_US: "Call MCP Tool"
    zh_Hans: "Call MCP Tool"
    pt_BR: "Call MCP Tool"
    ja_JP: "Call MCP Tool"
description:
  human:
    en_US: "Execute one MCP tool on the configured MCP server."
    zh_Hans: "Execute one MCP tool on the configured MCP server."
    pt_BR: "Execute one MCP tool on the configured MCP server."
    ja_JP: "Execute one MCP tool on the configured MCP server."
  llm: "Execute one MCP tool by tool_ref. tool_ref format is server_id::tool_name and should come from mcp_tool_list."
parameters:
  - name: tool_ref
    type: string
    required: true
    label:
      en_US: Tool Ref
    human_description:
      en_US: "MCP tool reference in server_id::tool_name format, returned by mcp_tool_list."
    llm_description: "MCP tool reference in server_id::tool_name format returned by mcp_tool_list."
    form: llm
  - name: input
    type: string
    required: true
    label:
      en_US: Input JSON
    human_description:
      en_US: "Arguments as a JSON string. Use {} when the tool takes no arguments."
    llm_description: 'JSON string for MCP tool arguments, matching the tool schema. Example: {"query":"test"}'
    form: llm
extra:
  python:
    source: tools/tool_call.py
