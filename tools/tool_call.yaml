identity:
  name: "call_mcp_tool"
  author: "kazuya-awano"
  label:
    en_US: "Call MCP Tool"
    zh_Hans: "Call MCP Tool"
    pt_BR: "Call MCP Tool"
    ja_JP: "Call MCP Tool"
description:
  human:
    en_US: "Execute one MCP tool on the configured MCP server."
    zh_Hans: "Execute one MCP tool on the configured MCP server."
    pt_BR: "Execute one MCP tool on the configured MCP server."
    ja_JP: "Execute one MCP tool on the configured MCP server."
  llm: "Execute one MCP tool on the configured MCP server. If you do not know the MCP tool name yet, call list_mcp_tool first. Never invoke returned MCP tool names directly as Dify tools; always use this tool with tool_name and a JSON string in arguments."
parameters:
  - name: tool_name
    type: string
    required: true
    label:
      en_US: Tool Name
    human_description:
      en_US: "Exact MCP tool name returned by List MCP Tool."
    llm_description: "Exact MCP tool name returned by list_mcp_tool. This is the remote MCP tool name, not a Dify tool name."
    form: llm
  - name: arguments
    type: string
    required: false
    label:
      en_US: Arguments
    human_description:
      en_US: "Tool arguments as a JSON string. Use {} when the MCP tool takes no arguments."
    llm_description: 'JSON string for the selected MCP tool arguments, matching its inputSchema. Example: {"query": "test"}. Do not pass plain text.'
    form: llm
extra:
  python:
    source: tools/tool_call.py
